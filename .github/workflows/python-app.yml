name: Build Multi-Platform Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Tkinter (Linux only)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y python3-tk

    - name: Install Tkinter (macOS only)
      if: runner.os == 'macOS'
      run: brew install python-tk@3.11

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pytest pytest-cov pytest-timeout
        pip install -r requirements.txt

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --timeout=30
      continue-on-error: false

    - name: Build executable with PyInstaller (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        pyinstaller --onefile --windowed --name RandPyPwMan main.py

    - name: Build executable with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --onefile --windowed --name RandPyPwMan main.py
      shell: cmd

    - name: Rename executable (Linux/macOS)
      if: runner.os != 'Windows'
      run: mv dist/RandPyPwMan dist/RandPyPwMan-${{ runner.os }}-${{ runner.arch }}

    - name: Rename executable (Windows)
      if: runner.os == 'Windows'
      run: move dist\RandPyPwMan.exe dist\RandPyPwMan-${{ runner.os }}-${{ runner.arch }}.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: RandPyPwMan-${{ runner.os }}-${{ runner.arch }}
        path: dist/*
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create or update latest release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        body: |
          Automated build from commit ${{ github.sha }}
          Built on ${{ github.event.head_commit.timestamp }}
        files: artifacts/**/*
        draft: false
        prerelease: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
